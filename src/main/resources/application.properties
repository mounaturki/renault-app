# ===============================
# SERVER
# ===============================
server.port=8081
# ===============================
# SPRING APPLICATION
# ===============================
spring.application.name=renault-app

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/renault_db
spring.datasource.username=postgres
spring.datasource.password=mouna
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# MULTIPART (Upload fichiers)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# TESSERACT OCR
# ===============================
# Windows :
tesseract.datapath=C:\\Program Files\\Tesseract-OCR\\tessdata
# Si Tesseract installť ailleurs, adapte le chemin

# ===============================
# LOGGING
# ===============================
logging.level.com.renault.app=DEBUG
logging.level.org.springframework.web=INFO